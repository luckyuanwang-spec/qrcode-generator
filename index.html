<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free QR Code Generator - Create QR Codes Online</title>
    <meta name="description" content="Free online QR code generator. Create QR codes for URLs, text, WiFi, vCards, and more. No registration required.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0 20px;
            color: white;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .tool-box {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .input-section {
            margin-bottom: 25px;
        }
        
        .input-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        
        .type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .type-tab {
            padding: 10px 18px;
            border: none;
            background: #f0f0f0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .type-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .qr-type-content {
            display: none;
        }
        
        .qr-type-content.active {
            display: block;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .options-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .option-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        
        .option-row label {
            min-width: 80px;
            font-weight: 500;
        }
        
        .option-row input[type="range"] {
            flex: 1;
        }
        
        .option-row input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .size-value {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .preview-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px dashed #e0e0e0;
            display: none;
        }
        
        .qr-preview {
            display: flex;
            justify-content: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .qr-preview img {
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-download {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-download:hover {
            background: #667eea;
            color: white;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: white;
        }
        
        @media (max-width: 600px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Free QR Code Generator</h1>
            <p>Create QR codes for URLs, Text, WiFi, vCards & More</p>
        </header>
        
        <div class="tool-box">
            <div class="input-section">
                <label>Select QR Code Type:</label>
                <div class="type-tabs">
                    <button class="type-tab active" onclick="switchType('url')">URL</button>
                    <button class="type-tab" onclick="switchType('text')">Text</button>
                    <button class="type-tab" onclick="switchType('wifi')">WiFi</button>
                    <button class="type-tab" onclick="switchType('vcard')">vCard</button>
                    <button class="type-tab" onclick="switchType('email')">Email</button>
                </div>
                
                <div id="url-content" class="qr-type-content active">
                    <label>Enter URL:</label>
                    <input type="url" id="url-input" placeholder="https://example.com">
                </div>
                
                <div id="text-content" class="qr-type-content">
                    <label>Enter Text:</label>
                    <textarea id="text-input" placeholder="Enter any text..."></textarea>
                </div>
                
                <div id="wifi-content" class="qr-type-content">
                    <div class="input-row">
                        <div>
                            <label>Network Name:</label>
                            <input type="text" id="wifi-ssid" placeholder="MyWiFi">
                        </div>
                        <div>
                            <label>Password:</label>
                            <input type="text" id="wifi-password" placeholder="Password">
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <label>Security:</label>
                        <select id="wifi-security">
                            <option value="WPA">WPA/WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">None</option>
                        </select>
                    </div>
                </div>
                
                <div id="vcard-content" class="qr-type-content">
                    <div class="input-row">
                        <div>
                            <label>Full Name:</label>
                            <input type="text" id="vcard-name" placeholder="John Doe">
                        </div>
                        <div>
                            <label>Phone:</label>
                            <input type="tel" id="vcard-phone" placeholder="+1 234 567 8900">
                        </div>
                    </div>
                    <div class="input-row" style="margin-top: 15px;">
                        <div>
                            <label>Email:</label>
                            <input type="email" id="vcard-email" placeholder="john@example.com">
                        </div>
                        <div>
                            <label>Company:</label>
                            <input type="text" id="vcard-org" placeholder="Company Name">
                        </div>
                    </div>
                </div>
                
                <div id="email-content" class="qr-type-content">
                    <div class="input-row">
                        <div>
                            <label>To:</label>
                            <input type="email" id="email-to" placeholder="example@email.com">
                        </div>
                        <div>
                            <label>Subject:</label>
                            <input type="text" id="email-subject" placeholder="Subject line">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="options-section">
                <h3>Customize</h3>
                <div class="option-row">
                    <label>Size:</label>
                    <input type="range" id="qr-size" min="150" max="400" value="250" oninput="updateSizeLabel()">
                    <span class="size-value" id="size-label">250px</span>
                </div>
            </div>
            
            <button class="btn-primary" onclick="generateQR()">Generate QR Code</button>
            
            <div class="preview-section" id="preview-section">
                <h3>Your QR Code</h3>
                <div class="qr-preview">
                    <img id="qrimg" src="" alt="QR Code">
                </div>
                <div class="download-buttons">
                    <button class="btn-download" onclick="downloadQR()">Download PNG</button>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Free Online Tools - No Signup Required</p>
        </footer>
    </div>
    
    <script>
        let currentType = 'url';
        let currentQRUrl = '';
        
        function switchType(type) {
            document.querySelectorAll('.type-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.qr-type-content').forEach(content => content.classList.remove('active'));
            document.getElementById(type + '-content').classList.add('active');
            currentType = type;
        }
        
        function updateSizeLabel() {
            document.getElementById('size-label').textContent = document.getElementById('qr-size').value + 'px';
        }
        
        function getQRContent() {
            let content = '';
            switch(currentType) {
                case 'url':
                    content = document.getElementById('url-input').value.trim();
                    break;
                case 'text':
                    content = document.getElementById('text-input').value.trim();
                    break;
                case 'wifi':
                    const ssid = document.getElementById('wifi-ssid').value.trim();
                    const password = document.getElementById('wifi-password').value.trim();
                    const security = document.getElementById('wifi-security').value;
                    if (!ssid) { alert('Please enter WiFi network name'); return null; }
                    content = 'WIFI:T:' + security + ';S:' + ssid + ';P:' + password + ';;';
                    break;
                case 'vcard':
                    const name = document.getElementById('vcard-name').value.trim();
                    const phone = document.getElementById('vcard-phone').value.trim();
                    const email = document.getElementById('vcard-email').value.trim();
                    const org = document.getElementById('vcard-org').value.trim();
                    content = 'BEGIN:VCARD\nVERSION:3.0';
                    if (name) content += '\nFN:' + name;
                    if (org) content += '\nORG:' + org;
                    if (phone) content += '\nTEL:' + phone;
                    if (email) content += '\nEMAIL:' + email;
                    content += '\nEND:VCARD';
                    break;
                case 'email':
                    let emailContent = 'mailto:' + document.getElementById('email-to').value.trim();
                    const subject = document.getElementById('email-subject').value.trim();
                    const params = [];
                    if (subject) params.push('subject=' + encodeURIComponent(subject));
                    if (params.length > 0) emailContent += '?' + params.join('&');
                    content = emailContent;
                    break;
            }
            if (!content) { alert('Please enter content'); return null; }
            return content;
        }
        
        function generateQR() {
            const content = getQRContent();
            if (!content) return;
            
            const size = parseInt(document.getElementById('qr-size').value);
            
            // Use QRServer API (reliable)
            currentQRUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(content);
            
            document.getElementById('qrimg').src = currentQRUrl;
            document.getElementById('preview-section').style.display = 'block';
        }
        
        function downloadQR() {
            if (!currentQRUrl) { alert('Please generate a QR code first'); return; }
            
            const link = document.createElement('a');
            link.href = currentQRUrl;
            link.download = 'qrcode.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        document.getElementById('url-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
